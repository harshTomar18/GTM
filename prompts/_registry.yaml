# Prompt registry — pins each agent to a specific prompt version.
#
# gtm-agent-run validates this before every run (Workstream D enforcement):
#   1. Agent slug must appear here.
#   2. @version suffix must match the <!-- prompt_version: --> header inside prompt.md.
#   3. model field must be a fully-pinned model ID (no aliases).
#
# Updating a prompt requires:
#   1. Bump the prompt_version header inside prompt.md.
#   2. Update this registry entry (@version + changelog_ref).
#   3. Run: promptfoo eval --config evals/promptfoo.yaml --agent <slug>
#   4. PR must include eval delta report — regression > 1σ blocks merge.
#
# See docs/PROMPT_CI_REFERENCE.md for full workflow.

version: 1

shared_fragments:
  profile_header: "prompts/_shared/profile_header.md@1.0.0"

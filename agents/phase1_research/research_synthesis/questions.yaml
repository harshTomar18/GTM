agent_slug: phase1.research_synthesis

questions:
  - id: q_stakeholders_for_dossier
    prompt: "Who must read this dossier before Phase 2 begins? (Names + roles. The exit gate requires CMO + SalesLeader, but additional stakeholders extend the review window.)"
    type: long_text
    required_for: plan
    reusable_key: cycle.stakeholders
    default: "CMO, SalesLeader"

  - id: q_pressure_test_rounds
    prompt: "How many rounds of pressure-testing? (1 = default; 2 = executive-led campaigns where strategic risk is high.)"
    type: number
    required_for: plan
    default: "1"

  - id: q_known_strategic_constraints
    prompt: "Are there strategic constraints we MUST honor that the upstream agents may not know about? (e.g., 'no enterprise messaging until we close current self-serve renewal cycle', 'don't position against Competitor X by name — partnership in motion')"
    type: long_text
    required_for: gather
    reusable_key: cycle.strategic_constraints

# Microsoft Corporation - GTM Profile
# Created via the SME Input Layer

version: 2
profile_id: microsoft
extends: vertical_packs/_template

company:
  legal_name: "Microsoft Corporation"
  brand_name: "Microsoft"
  url: "https://microsoft.com"
  founded: 1975
  size_band: "enterprise"
  hq_country: "US"
  description_short: "Enabling individuals and organizations around the world to achieve more."
  description_long: |
    Microsoft is a global technology company that develops, manufactures, licenses,
    supports, and sells computer software, consumer electronics, personal computers,
    and services. Its flagship products include the Windows OS, Microsoft 365, Azure
    Cloud, LinkedIn, and Xbox. It serves businesses and consumers in over 190 countries.

industry:
  primary: "enterprise_software_cloud"
  secondary: ["productivity", "cloud_computing", "ai", "gaming", "professional_networking"]

lob:
  - id: microsoft_365
    motion: enterprise_abm
    weight: 0.4
  - id: azure_cloud
    motion: enterprise_abm
    weight: 0.4
  - id: copilot_ai
    motion: plg
    weight: 0.2

icp_archetypes:
  - id: enterprise_it_decision_maker
    industries: ["all"]
    company_size: ["500+"]
    geos: ["US", "UK", "EU", "IN", "AU"]
    buying_committee:
      economic_buyer: "CTO"
      technical_buyer: "IT Director"
      user_buyer: "Knowledge Workers"
      influencers: ["CISO", "CFO", "HR Director"]
    committee_complexity: "high"
    deal_size_band: "50k-10m"
    sales_cycle_days: 120

brand_voice:
  archetype: "Sage"
  tone: ["empowering", "inclusive", "innovative", "trustworthy", "clear"]
  reading_level: "grade_12"
  banned_phrases:
    - "cheap"
    - "disruptive"
    - "revolutionary"
    - "game-changing"
  required_disclaimers: []

geography:
  primary_markets: ["US", "UK", "DE", "IN", "JP"]
  expansion_markets: ["BR", "MX", "ZA", "SG"]

languages:
  default: "en-US"
  supported: ["en-US", "en-GB", "de-DE", "ja-JP", "hi-IN", "pt-BR"]

currency:
  default: "USD"
  reporting: "USD"

tech_stack:
  crm: "microsoft_dynamics"
  marketing_automation: "microsoft_dynamics"
  analytics: "microsoft_clarity"
  seo: "ahrefs"
  social: "linkedin"
  ad_platforms: ["linkedin_ads", "bing_ads", "google_ads"]
  data_warehouse: "azure_synapse"

approval_roles:
  - role: CMO
    name: "Microsoft CMO"
    scope: [brand, campaign, positioning]
    notification: [email]
  - role: Legal
    name: "Microsoft Legal Team"
    scope: [regulatory_claims, customer_logos, competitive_claims]
  - role: CEO
    name: "Microsoft CEO"
    scope: [executive_voice, positioning]

operating_calendar:
  cycle_length: monthly
  fiscal_year_start: "07-01"
  blackout_dates: []
